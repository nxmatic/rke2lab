kind: ServiceAccount
apiVersion: v1
metadata: # kpt-merge: porch-system/porch-server
  name: porch-server
  namespace: porch-system
  annotations:
    internal.kpt.dev/upstream-identifier: '|ServiceAccount|porch-system|porch-server'
imagePullSecrets:
  - name: ${porch-image-pull-secret} # kpt-set: ${porch-image-pull-secret}
---
apiVersion: apps/v1
kind: Deployment
metadata: # kpt-merge: porch-system/porch-server
  name: porch-server
  namespace: porch-system
  annotations:
    internal.kpt.dev/upstream-identifier: 'apps|Deployment|porch-system|porch-server'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: porch-server
  template:
    metadata:
      labels:
        app: porch-server
    spec:
      serviceAccountName: porch-server
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: webhook-certs
          emptyDir: {}
        - name: api-server-certs
          emptyDir: {}
        - name: git-bin
          emptyDir: {}
      initContainers:
        - name: install-git
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache git ca-certificates openssh-client
              cp -r /usr/bin/git* /git-bin/
              cp /usr/bin/ssh* /git-bin/ || true
          volumeMounts:
            - name: git-bin
              mountPath: /git-bin
          securityContext:
            runAsUser: 0
      containers:
        - name: porch-server
          # Update image to the image of your porch apiserver build.
          image: ${porch-server-image} # kpt-set: ${porch-server-image}
          imagePullPolicy: IfNotPresent
          args:
            - --function-runner=function-runner:9445
            - --cache-directory=/cache
            - --cert-dir=/tmp/certs
            - --cache-type=db
            - --secure-port=4443
            - --repo-sync-frequency=3m
            - --repo-operation-retry-attempts=3
            - --max-request-body-size=6291456
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
          volumeMounts:
            - mountPath: /cache
              name: cache-volume
            - mountPath: /etc/webhook/certs
              name: webhook-certs
            - name: api-server-certs
              mountPath: /tmp/certs
            - name: git-bin
              mountPath: /usr/bin/git
              subPath: git
            - name: git-bin
              mountPath: /usr/bin/git-remote-https
              subPath: git-remote-https
          env:
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: DB_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: porch-db-config
                  key: DB_DRIVER
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: porch-db-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: porch-db-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: porch-db-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: porch-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: porch-db-secret
                  key: DB_PASSWORD
            # Uncomment to enable trace-reporting to jaeger
            #- name: OTEL
            #  value: otel://jaeger-oltp:4317
            - name: OTEL_SERVICE_NAME
              value: porch-server
            - name: CERT_STORAGE_DIR
              value: /etc/webhook/certs
            - name: GOOGLE_API_GO_EXPERIMENTAL_DISABLE_NEW_AUTH_LIB
              value: "true"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4443
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata: # kpt-merge: porch-system/api
  name: api
  namespace: porch-system
  annotations:
    internal.kpt.dev/upstream-identifier: '|Service|porch-system|api'
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 4443
      name: api
    - port: 8443
      protocol: TCP
      targetPort: 8443
      name: webhooks
  selector:
    app: porch-server
